      how_to:
        blocks:
          - content: |-
              Twitchからビデオをダウンロードし、最高のゲームの瞬間を永遠に保存する方法

              Twitchは世界最高のゲームプラットフォームで、毎日何トンものユニークなコンテンツが作られている。ストリーマーは複雑なゲームをプレイし、感情を共有し、チャットし、視聴者は歴史的瞬間を目撃する。しかし、Twitchには1つ残酷な機能がある。VOD（ビデオ・オン・デマンド）、つまり過去の放送の録画は、14～60日（パートナーの状況による）で消えてしまう。クリップは長く保存されるが、それも削除されるか、ストリーマーがチャンネルを閉じることができる。

              昨日、クールなストリームを見て、今日、重要な瞬間を見直したいと思ったが、その放送はすでに削除されていた？ あるいは、チャットに参加した面白いクリップを保存して、後で友人に投げたいと思った？Twitchには「ダウンロード」ボタンがありません。そんな時こそ、私たちのオンラインTwitch動画ダウンローダーの出番です。

              ストリーミングとは異なり、ダウンロードしたビデオは常にハードドライブや携帯電話のメモリーに残ります。インターネットなしで再視聴したり、カットを編集したり、お気に入りのストリーマーの思い出に残る瞬間を集めたりすることができます。
          - title: どのように機能するのか？
            content: |-
              私たちのTwitchビデオアップローダーは、できるだけ簡単にコンテンツを保存することができます。簡単な3ステップです：

              1.  リンクをコピーする。Twitchにアクセスし、目的のクリップまたはVOD（過去の放送）を開きます。ブラウザのアドレスバーからリンクをコピーする。クリップの場合は、「共有」→「リンクをコピー」ボタンでもOK。
              2.  ダウンローダーに貼り付ける。当サイトに戻り、コピーしたリンクを上のボックスに貼り付け、「ダウンロード」をクリックします。
              3.  結果を保存します。システムはリクエストを処理し、利用可能な最高の品質で完成したMP4ファイルをダウンロードすることを提供します。
            image: /images/1_twitch.jpg
            imageAlt: Twitchからビデオをダウンロードする
          - title: なぜユーザーは私たちのサービスを選ぶのか？
            content: |-
              Twitchをダウンロードするためのツールはインターネット上にたくさんありますが、そのほとんどは、サイトが更新されるたびに動かなくなる粗悪なブラウザ拡張機能か、広告だらけのサイトです。私たちは本物のTwitchファンのために、安定で便利なソリューションを提供します。

                 VODとクリップのダウンロード：両方のコンテンツに対応しています。ストーリーゲームのチュートリアル全体を保存したいですか？簡単です。30秒の面白い瞬間をカットしたいですか？問題ありません。私たちのTwitchビデオダウンローダは、すべてのリンクで動作します。
                 オリジナルビデオ品質：放送されたままのビデオを入手できます。ほとんどのストリームは720pまたは1080p（ソース）です。私たちは圧縮せずにオリジナルの品質を保持します。高画質でTwitchからビデオをダウンロードする必要がある場合、あなたは正しい場所にいます。
                 m3u8ストリームでの作業：Twitchは洗練されたビデオストリーミングシステム（HLS m3u8）を使用しています。当社のサービスは、これらのセグメントを1つのシームレスなMP4ファイルに適切に「接着」する方法を知っています。
                 ライブストリームをダウンロードしますか？当社のダウンローダーは、すでに完了した放送（VOD）とクリップで動作します。ストリームが現在進行中である場合、その場でダウンロードすることはできず、録画にビデオが表示されるまで最後まで待つ必要があります。

              壮大な瞬間を失う恐れは忘れてください。Twitchからお気に入りのゲームの最高のストリーム、クリップ、ウォークスルーをパソコンやスマホに保存して、電車の中、地下鉄の中、インターネットのない自宅など、どこでも視聴をお楽しみください。私たちのサービスは、VOD削除後も消えることのない、お気に入りのコンテンツのアーカイブを作成する高速かつ無料の方法です。
