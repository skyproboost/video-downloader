  faq:
    - question: Могу ли я скачать текущий прямой эфир (Live), который идет прямо сейчас?
      answer: Нет, напрямую скачать "живой" стрим с помощью нашего сервиса нельзя, так
        как видео еще не завершено и не сохранено на серверах Twitch как цельный
        файл. Вам нужно дождаться окончания трансляции, после чего она появится
        во вкладке "Видео" (VOD) на канале стримера. Скопируйте ссылку на эту
        запись, и наш загрузчик легко ее скачает.
    - question: Почему некоторые VOD не скачиваются или выдают ошибку?
      answer: Это может быть связано с настройками приватности. Если стример включил
        режим "Только для подписчиков" во время стрима, или позже сделал VOD
        доступным только по подписке, наш сервис (как и любой другой публичный
        инструмент) не сможет получить доступ к видео. Ищите публичные VOD или
        клипы.
    - question: Я скачал VOD, а он весит очень много. Это нормально?
      answer: Да, это абсолютно нормально. Видео в высоком качестве (особенно 1080p с
        высоким битрейтом) занимает много места. Например, двухчасовой стрим в
        хорошем качестве может весить 3-5 ГБ. Мы скачиваем оригинальный файл без
        сжатия, поэтому размер соответствует исходному.
    - question: Как скачать видео с Twitch на телефон (Android или iPhone)?
      answer: Очень просто! Откройте наш сайт в браузере вашего телефона (Chrome,
        Safari), вставьте ссылку на клип или VOD и нажмите скачать. На Android
        файл окажется в папке "Загрузки". На iPhone нажмите "Скачать", а затем
        сохраните видео в приложении "Файлы" или поделитесь им.
    - question: Есть ли ограничение на длину VOD, который можно скачать?
      answer: Мы стараемся не ограничивать пользователей. Вы можете скачивать как
        короткие клипы (30 секунд), так и многочасовые стримы (например,
        8-часовые марафоны или прохождения игр). Единственное
        условие  стабильность вашего интернет-соединения, так как файлы могут
        быть большими.
    - question: Не нарушаю ли я авторские права стримера, скачивая его видео?
      answer: Скачивание контента для личного использования (чтобы сохранить
        понравившийся стрим в архив и пересмотреть его позже без интернета)
        обычно не является нарушением. Однако публичная перезаливка скачанных
        VOD на другие платформы или использование их в коммерческих целях без
        согласия стримера может нарушать его права. Уважайте труд авторов и
        используйте скачанные видео для личной коллекции.
