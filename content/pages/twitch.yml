  intro: Вставьте ссылку на стрим, клип или VOD с Twitch, чтобы мгновенно скачать
    видео в оригинальном качестве, без регистрации и рекламы
  how_to:
    blocks:
      - content: >-
          Как скачать видео с Twitch и сохранить лучшие игровые моменты навсегда


          Twitch - это главная игровая платформа мира, где каждый день создается
          тонны уникального контента. Здесь стримеры проходят сложные игры,
          делятся эмоциями, общаются с чатом, а зрители становятся свидетелями
          исторических моментов: первых побед, эпичных провалов, редких скинов и
          просто душевных разговоров. Но у Twitch есть одна жестокая
          особенность  VOD (Video on Demand), то есть записи прошлых трансляций,
          исчезают через 14-60 дней (в зависимости от статуса партнера). Клипы
          хоть и хранятся дольше, но их тоже могут удалить, или стример закроет
          канал.


          Вы смотрели крутой стрим вчера, а сегодня хотите пересмотреть ключевой
          момент, но трансляция уже удалена? Или хотите сохранить забавный клип
          со своим участием в чате, чтобы потом кинуть другу? Twitch не дает
          кнопки «Скачать». Именно для этого и нужен наш онлайн Twitch Video
          Downloader.


          В отличие от потокового просмотра, скачанное видео всегда остается у
          вас на жестком диске или в памяти телефона. Вы можете пересматривать
          его без интернета, монтировать нарезки или просто коллекционировать
          памятные моменты любимых стримеров.
      - title: Как это работает?
        content: >-
          Наш загрузчик видео с Твича максимально упрощает процесс сохранения
          контента. Всего три простых шага:


          1.  Копируйте ссылку. Зайдите на Twitch, откройте нужный клип или VOD
          (прошлую трансляцию). Скопируйте ссылку из адресной строки браузера.
          Для клипов также подойдет кнопка «Поделиться» → «Копировать ссылку».

          2.  Вставляйте в загрузчик. Вернитесь на наш сайт, вставьте
          скопированную ссылку в поле выше и нажмите кнопку «Скачать».

          3.  Сохраняйте результат. Система обработает запрос и предложит вам
          скачать готовый MP4-файл в наилучшем доступном качестве.
        image: /images/1_twitch.jpg
        imageAlt: Скачать видео с Twitch
      - title: Почему пользователи выбирают именно наш сервис?
        content: >-
          В интернете можно найти множество инструментов для скачивания с
          Twitch, но большинство из них  это сырые расширения для браузеров,
          которые перестают работать после каждого обновления сайта, либо сайты,
          заваленные рекламой. Мы предлагаем стабильное и удобное решение для
          настоящих фанатов Twitch.

             Скачивание VOD и клипов: Мы поддерживаем оба типа контента. Хотите сохранить прохождение сюжетной игры целиком? Легко. Хотите вырезать смешной момент длиной 30 секунд? Тоже без проблем. Наш Twitch video downloader онлайн работает с любыми ссылками.
             Оригинальное качество видео: Вы получаете видео именно в том качестве, в котором оно вышло в эфир. Большинство стримов идут в 720p или 1080p (Source). Мы сохраняем исходное качество без сжатия. Если вам нужно скачать видео с твича в высоком качестве, вы по адресу.
             Работа с м3u8 потоками: Twitch использует сложную систему потоковой передачи видео (HLS  m3u8). Наш сервис умеет правильно "склеивать" эти сегменты в один цельный MP4-файл, который удобно хранить и проигрывать на любом устройстве.
             Скачивание живых стримов? Наш загрузчик работает с уже завершенными трансляциями (VOD) и клипами. Если стрим идет прямо сейчас, вы не сможете скачать его "на лету"  нужно дождаться окончания, чтобы видео появилось в записях.

          Забудьте о страхе потерять эпичный момент. Сохраняйте лучшие стримы,
          клипы и прохождения любимых игр с Twitch на свой компьютер или телефон
          и наслаждайтесь просмотром где угодно: в поездке, в метро или на даче
          без интернета. Наш сервис  это быстрый и бесплатный способ создать
          архив любимого контента, который не исчезнет после удаления VOD.
