      faq:
        - question: Şu anda devam etmekte olan canlı yayını (Live) indirebilir miyim?
          answer: Hayır, video henüz tamamlanmadığından ve Twitch sunucularına bütün bir
            dosya olarak kaydedilmediğinden, hizmetimizi kullanarak bir canlı
            yayını doğrudan indiremezsiniz. Yayının bitmesini beklemeniz
            gerekir, ardından yayıncının kanalındaki "VOD" sekmesinde
            görünecektir. Bu kaydın bağlantısını kopyalayın ve indiricimiz
            kolayca indirsin.
        - question: Neden bazı VOD'lar indirilmiyor veya hata veriyor?
          answer: Bu durum gizlilik ayarlarıyla ilgili olabilir. Yayıncı yayın sırasında
            "Yalnızca Aboneler" modunu etkinleştirdiyse veya daha sonra VOD'u
            yalnızca abonelikle kullanılabilir hale getirdiyse, hizmetimiz
            (diğer herkese açık araçlar gibi) videoya erişemeyecektir. Herkese
            açık VOD'ları veya klipleri arayın.
        - question: VOD'u indirdim ve çok ağır. Bu normal mi?
          answer: Evet, bu kesinlikle normaldir. Yüksek kaliteli video (özellikle yüksek
            bit hızına sahip 1080p) çok fazla yer kaplar. Örneğin, iyi kalitede
            iki saatlik bir akış 3-5 GB ağırlığında olabilir. Orijinal dosyayı
            sıkıştırma olmadan indiriyoruz, bu nedenle boyut orijinaliyle aynı.
        - question: Twitch videolarını telefonuma (Android veya iPhone) nasıl
            indirebilirim?
          answer: Çok basit! Telefonunuzun tarayıcısında (Chrome, Safari) web sitemizi
            açın, klibin veya VOD'un bağlantısını yapıştırın ve indir düğmesine
            basın. Android'de dosya "İndirilenler" klasöründe görünecektir.
            iPhone'da "İndir "e tıklayın ve ardından videoyu "Dosyalar"
            uygulamasına kaydedin veya paylaşın.
        - question: İndirilebilecek VOD uzunluğu için bir sınır var mı?
          answer: Kullanıcılarımızı sınırlamamaya çalışıyoruz. Hem kısa klipleri (30
            saniye) hem de saatler süren yayınları (örneğin, 8 saatlik
            maratonlar veya oyun izlenimleri) indirebilirsiniz. Dosyalar büyük
            olabileceğinden, tek koşul internet bağlantınızın sağlamlığıdır.
        - question: Videolarını indirerek yayıncının telif hakkını ihlal ediyor muyum?
          answer: Kişisel kullanım için içerik indirmek (favori yayınınızı bir arşive
            kaydetmek ve daha sonra internet olmadan izlemek için) genellikle
            bir ihlal değildir. Ancak, indirilen VOD'ların herkese açık olarak
            başka platformlara yüklenmesi veya yayıncının izni olmadan ticari
            amaçlarla kullanılması haklarını ihlal edebilir. Yazarların emeğine
            saygı gösterin ve indirdiğiniz videoları kişisel koleksiyonunuz için
            kullanın.
