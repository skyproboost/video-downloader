      how_to:
        blocks:
          - content: >-
              Twitch'ten video indirme ve en iyi oyun anlarını sonsuza kadar
              kaydetme


              Twitch, her gün tonlarca benzersiz içeriğin oluşturulduğu dünyanın
              önde gelen oyun platformudur. Burada yayıncılar karmaşık
              oyunlardan geçiyor, duygularını paylaşıyor, sohbet ediyor ve
              izleyiciler tarihi anlara tanık oluyor: ilk zaferler, destansı
              başarısızlıklar, nadir kostümler ve sadece içten sohbetler. Ancak
              Twitch'in acımasız bir özelliği var VOD (Video on Demand), yani
              geçmiş yayınların kayıtları 14-60 gün sonra kayboluyor (ortağın
              durumuna bağlı olarak). Klipler daha uzun süre saklansa da, onlar
              da silinebilir veya yayıncı kanalı kapatabilir.


              Dün harika bir yayın izlediniz ve bugün önemli bir anı gözden
              geçirmek istiyorsunuz, ancak yayın çoktan silindi mi? Ya da
              sohbete katıldığınız komik bir klibi daha sonra bir arkadaşınıza
              atmak için kaydetmek mi istiyorsunuz? Twitch size bir "İndir"
              düğmesi sunmuyor. Çevrimiçi Twitch Video İndiricimiz tam olarak
              bunun içindir.


              Akıştan farklı olarak, indirdiğiniz video her zaman sabit
              diskinizde veya telefonunuzun hafızasında kalır. İnternet olmadan
              tekrar izleyebilir, kesikleri düzenleyebilir veya en sevdiğiniz
              yayıncıların unutulmaz anlarını toplayabilirsiniz.
          - title: Nasıl çalışıyor?
            content: >-
              Twitch video yükleyicimiz, içerik kaydetmeyi olabildiğince
              kolaylaştırır. Sadece üç basit adım:


              1.  Bağlantıyı kopyalayın. Twitch'e gidin, istediğiniz klibi veya
              VOD'u (geçmiş yayın) açın. Bağlantıyı tarayıcınızın adres
              çubuğundan kopyalayın. Klipler için "Paylaş" → "Bağlantıyı
              Kopyala" düğmesi de işe yarayacaktır.

              2.  İndiriciye yapıştırın. Web sitemize geri dönün, kopyaladığınız
              bağlantıyı yukarıdaki kutuya yapıştırın ve "İndir "e tıklayın.

              3.  Sonucu kaydedin. Sistem talebi işleyecek ve bitmiş MP4
              dosyasını mevcut en iyi kalitede indirmenizi önerecektir.
            image: /images/1_twitch.jpg
            imageAlt: Twitch'ten video indir
          - title: Kullanıcılar neden hizmetimizi tercih ediyor?
            content: >-
              İnternette Twitch indirmek için birçok araç var, ancak bunların
              çoğu her site güncellemesinden sonra çalışmayı durduran kaba
              tarayıcı uzantıları veya reklamlarla dolu siteler. Gerçek Twitch
              hayranları için istikrarlı ve kullanışlı bir çözüm sunuyoruz.

                 VOD ve klip indirme: Her iki içerik türünü de destekliyoruz. Hikaye oyununun tamamını kaydetmek mi istiyorsunuz? Çok kolay. Komik bir anı 30 saniye uzunluğunda kesmek mi istiyorsunuz? O da sorun değil. Twitch çevrimiçi video indiricimiz tüm bağlantılarla çalışır.
                 Orijinal video kalitesi: Videoyu tam olarak yayınlandığı gibi alırsınız. Çoğu yayın 720p veya 1080p'dir (Kaynak). Orijinal kaliteyi sıkıştırma olmadan koruyoruz. Twitch'ten yüksek kalitede video indirmeniz gerekiyorsa, doğru yerdesiniz.
                 m3u8 akışlarıyla çalışma: Twitch sofistike bir video akış sistemi (HLS m3u8) kullanır. Hizmetimiz, bu segmentleri herhangi bir cihazda saklamak ve oynatmak için uygun olan kesintisiz bir MP4 dosyasına nasıl düzgün bir şekilde "yapıştıracağını" bilir.
                 Canlı yayın mı indiriyorsunuz? İndiricimiz halihazırda tamamlanmış yayınlar (VOD) ve kliplerle çalışır. Yayın şu anda devam ediyorsa, anında indiremezsiniz, videonun kayıtlarda görünmesi için sonuna kadar beklemeniz gerekir.

              Destansı bir anı kaybetme korkusunu unutun. Twitch'ten en
              sevdiğiniz oyunların en iyi yayınlarını, kliplerini ve izlenecek
              yollarını bilgisayarınıza veya telefonunuza kaydedin ve bunları
              her yerde izlemenin keyfini çıkarın: trende, metroda veya
              internetsiz evde. Hizmetimiz, VOD silme işleminden sonra
              kaybolmayacak favori içeriğinizin arşivini oluşturmanın hızlı ve
              ücretsiz bir yoludur.
