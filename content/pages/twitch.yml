      faq:
        - question: ¿Puedo descargar la transmisión en directo (Live) que está teniendo
            lugar en este momento?
          answer: No, no puedes descargar directamente una retransmisión en directo
            utilizando nuestro servicio, ya que el vídeo aún no está completo y
            no se guarda en los servidores de Twitch como un archivo completo.
            Tienes que esperar a que termine la retransmisión, después de lo
            cual aparecerá en la pestaña "VOD" del canal del streamer. Copia el
            enlace a esta grabación y nuestro descargador la descargará
            fácilmente.
        - question: ¿Por qué algunos vídeos a la carta no se descargan o dan error?
          answer: Esto puede estar relacionado con la configuración de privacidad. Si el
            emisor activó el modo "Sólo abonados" durante la emisión, o si más
            tarde hizo que el vídeo a la carta sólo estuviera disponible
            mediante suscripción, nuestro servicio (como cualquier otra
            herramienta pública) no podrá acceder al vídeo. Busca VOD o clips
            públicos.
        - question: He descargado el VOD y pesa mucho. ¿Es normal?
          answer: Sí, es absolutamente normal. Los vídeos de alta calidad (sobre todo
            1080p con bitrate alto) ocupan mucho espacio. Por ejemplo, un stream
            de dos horas en buena calidad puede pesar entre 3 y 5 GB. Nosotros
            descargamos el archivo original sin comprimir, por lo que el tamaño
            es el mismo que el original.
        - question: ¿Cómo puedo descargar vídeos de Twitch a mi teléfono (Android o
            iPhone)?
          answer: Muy sencillo Abra nuestro sitio web en el navegador de su teléfono
            (Chrome, Safari), pegue el enlace al clip o VOD y pulse descargar.
            En Android, el archivo aparecerá en la carpeta "Descargas". En
            iPhone, pulsa "Descargar" y luego guarda el vídeo en la aplicación
            "Archivos" o compártelo.
        - question: ¿Existe un límite para la duración del vídeo a la carta que se puede
            descargar?
          answer: Intentamos no limitar a nuestros usuarios. Puedes descargar tanto clips
            cortos (30 segundos) como secuencias de horas (por ejemplo,
            maratones de 8 horas o game walkthroughs). La única condición es la
            estabilidad de tu conexión a Internet, ya que los archivos pueden
            ser pesados.
        - question: ¿Estoy violando los derechos de autor del streamer al descargar sus
            vídeos?
          answer: La descarga de contenidos para uso personal (para guardar su emisión
            favorita en un archivo y verla más tarde sin Internet) no suele
            constituir una infracción. Sin embargo, subir públicamente los
            vídeos a la carta descargados a otras plataformas o utilizarlos con
            fines comerciales sin el consentimiento del autor puede violar sus
            derechos. Respeta el trabajo de los autores y utiliza los vídeos
            descargados para tu colección personal.
