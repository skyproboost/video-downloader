          answer: Нет, напрямую скачать "живой" стрим с помощью нашего сервиса нельзя, так
            как видео еще не завершено и не сохранено на серверах Twitch как
            цельный файл. Вам нужно дождаться окончания трансляции, после чего
            она появится во вкладке "Видео" (VOD) на канале стримера. Скопируйте
            ссылку на эту запись, и наш загрузчик легко ее скачает.
        - question: Почему некоторые VOD не скачиваются или выдают ошибку?
          answer: Это может быть связано с настройками приватности. Если стример включил
            режим "Только для подписчиков" во время стрима, или позже сделал VOD
            доступным только по подписке, наш сервис (как и любой другой
            публичный инструмент) не сможет получить доступ к видео. Ищите
            публичные VOD или клипы.
