      intro: Twitch의 스트림, 클립 또는 VOD 링크를 붙여넣으면 등록이나 광고 없이 원본 화질로 동영상을 즉시 다운로드할 수 있습니다.
      how_to:
        blocks:
          - content: >-
              Twitch에서 동영상을 다운로드하고 최고의 게임 순간을 영원히 저장하는 방법


              Twitch는 매일 수많은 독특한 콘텐츠가 만들어지는 세계 최고의 게임 플랫폼입니다. 스트리머들은 이곳에서 복잡한
              게임을 진행하고, 감정을 공유하고, 채팅을 하며, 시청자들은 첫 승리, 멋진 실패, 희귀한 스킨, 진심 어린 대화 등
              역사적인 순간을 목격합니다. 하지만 Twitch에는 한 가지 잔인한 기능이 있습니다. VOD(주문형 비디오), 즉 과거
              방송의 녹화는 파트너의 상태에 따라 14~60일 후에 사라집니다. 클립은 더 오래 보관되지만 클립도 삭제하거나
              스트리머가 채널을 닫을 수 있습니다.


              어제 멋진 방송을 시청했는데 오늘 중요한 순간을 다시 보고 싶은데 방송이 이미 삭제되었나요? 또는 채팅에 참여한
              재미있는 클립을 저장하여 나중에 친구에게 보여주고 싶으신가요? Twitch에는 "다운로드" 버튼이 없습니다. 온라인
              Twitch 동영상 다운로더가 바로 이 문제를 해결해 줍니다.


              스트리밍과 달리 다운로드한 동영상은 항상 하드 드라이브나 휴대폰 메모리에 저장됩니다. 인터넷 없이도 다시 보거나, 컷을
              편집하거나, 좋아하는 스트리머의 기억에 남는 순간을 모을 수 있습니다.
          - title: 어떻게 작동하나요?
            content: >-
              Twitch 동영상 업로더를 사용하면 콘텐츠를 최대한 쉽게 저장할 수 있습니다. 간단한 세 단계만 거치면 됩니다:


              1.  링크를 복사합니다. Twitch로 이동하여 원하는 클립 또는 VOD(지난 방송)를 엽니다. 브라우저의 주소
              표시줄에서 링크를 복사합니다. 클립의 경우 '공유' → '링크 복사' 버튼도 작동합니다.

              2.  다운로더에 붙여넣습니다. 웹사이트로 돌아가서 복사한 링크를 위의 상자에 붙여넣고 "다운로드"를 클릭합니다.

              3.  결과를 저장합니다. 시스템이 요청을 처리하고 완성된 MP4 파일을 최상의 화질로 다운로드할 수 있도록
              제공합니다.
            image: /images/1_twitch.jpg
            imageAlt: Twitch에서 동영상 다운로드
          - title: 사용자들은 왜 저희 서비스를 선택하나요?
            content: >-
              인터넷에서 Twitch를 다운로드할 수 있는 도구는 많지만, 대부분 사이트가 업데이트될 때마다 작동을 멈추는 조잡한
              브라우저 확장 프로그램이나 광고로 가득 찬 사이트가 대부분입니다. 저희는 진정한 Twitch 팬을 위한 안정적이고
              편리한 솔루션을 제공합니다.

                 VOD 및 클립 다운로드: 두 가지 유형의 콘텐츠를 모두 지원합니다. 전체 스토리 게임 공략을 저장하고 싶으신가요? 간단합니다. 30초 길이의 재미있는 순간을 잘라내고 싶으신가요? 그것도 문제없습니다. Twitch 동영상 다운로더 온라인은 모든 링크에서 작동합니다.
                 원본 동영상 품질: 방송된 그대로의 동영상을 볼 수 있습니다. 대부분의 스트림은 720p 또는 1080p(소스)입니다. 압축하지 않고 원본 화질을 보존합니다. Twitch에서 고화질로 동영상을 다운로드해야 하는 경우 제대로 찾아 오셨습니다.
                 m3u8 스트림으로 작업하기: Twitch는 정교한 동영상 스트리밍 시스템(HLS m3u8)을 사용합니다. Twitch 서비스는 이러한 세그먼트를 하나의 매끄러운 MP4 파일로 적절히 '접착'하는 방법을 알고 있으므로 모든 디바이스에서 편리하게 저장하고 재생할 수 있습니다.
                 라이브 스트림을 다운로드하시나요? 저희 다운로더는 이미 완료된 방송(VOD) 및 클립과 함께 작동합니다. 지금 스트림이 진행 중인 경우에는 즉석에서 다운로드할 수 없으며, 동영상이 녹화물에 나타날 때까지 끝까지 기다려야 합니다.

              멋진 순간을 놓칠 염려는 이제 잊으세요. 좋아하는 게임의 최고의 방송, 클립, 공략을 Twitch에서 컴퓨터나 휴대폰에
              저장하고 전철, 지하철, 인터넷이 없는 집 등 어디서나 즐겨보세요. 이 서비스는 좋아하는 콘텐츠를 빠르고 무료로
              아카이브로 만들어 VOD 삭제 후에도 사라지지 않습니다.
        title: Twitch에서 동영상을 다운로드하는 방법
      features:
        title: 장점
        items:
          - icon: "🎥 "
            title: VOD 및 클립 다운로드
            description: Twitch는 전체 방송 녹화(VOD)와 짧은 클립 등 모든 유형의 동영상을 지원합니다. 링크를 붙여넣기만 하면 자동으로
              형식을 감지합니다.
          - icon: "⚡ "
            title: 즉시 처리
            description: 서버는 몇 초 만에 링크를 처리합니다. 동영상 분석 후 완성된 MP4 다운로드가 즉시 시작되므로 변환을 기다릴 필요가
              없습니다.
          - icon: "🔊 "
            title: 완벽한 사운드와 영상
            description: 기술적으로 까다로운 일부 플랫폼과 달리, 저희는 항상 오디오 및 비디오 트랙이 완벽하게 동기화된 완성된 파일을
              제공합니다.
          - icon: "🔒 "
            title: 안전한 익명성
            description: 다운로드 기록을 저장하거나 Twitch 계정에 대한 액세스를 요청하지 않습니다. 모든 파일은 다운로드 후 즉시 서버에서
