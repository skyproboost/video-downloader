      faq:
        - question: 今行われているライブストリーム（生中継）をダウンロードすることはできますか？
          answer: Twitchのライブストリームはまだ完全ではなく、ファイル全体としてTwitchサーバーに保存されていないため、Twitchのサービスを使用して直接ダウンロードすることはできません。放送の終了を待つ必要があり、その後、ストリーマーのチャンネルの「VOD」タブに表示されます。この録画へのリンクをコピーすれば、私たちのダウンローダーが簡単にダウンロードできます。
        - question: 一部のVODがダウンロードできない、またはエラーが出るのはなぜですか？
          answer: これはプライバシー設定に関連している可能性があります。ストリーマーがストリーム中に「加入者のみ」モードを有効にした場合、または後にVODを加入者のみで利用可能にした場合、当社のサービス（他の公開ツールと同様）はビデオにアクセスできません。公開されているVODやクリップを探してください。
        - question: VODをダウンロードしたら、かなり重くなった。これって普通？
          answer: はい、これはまったく普通のことです。高品質のビデオ（特に高ビットレートの1080p）は多くの容量を消費します。例えば、高画質で2時間のストリームは3-5GBになります。私たちは圧縮せずにオリジナルファイルをダウンロードするので、サイズはオリジナルと同じです。
        - question: Twitchのビデオを携帯電話（AndroidまたはiPhone）にダウンロードする方法を教えてください。
          answer: とても簡単です！お使いの携帯電話のブラウザ（Chrome、Safari）で当社のウェブサイトを開き、クリップまたはVODへのリンクを貼り付けてダウンロードを押してください。Androidの場合、ファイルは「ダウンロード」フォルダに表示されます。iPhoneの場合は、「ダウンロード」をクリックし、「ファイル」アプリでビデオを保存するか、共有します。
        - question: ダウンロードできるVODの長さに制限はありますか？
          answer: 私たちはユーザーを制限しないようにしています。短いクリップ（30秒）から長時間のストリーム（例えば、8時間のマラソンやゲームのウォークスルー）までダウンロードできます。唯一の条件は、ファイルが大きくなる可能性があるため、インターネット接続が安定していることです。
        - question: ストリーマーのビデオをダウンロードすることは、ストリーマーの著作権を侵害することになりますか？
          answer: 個人的な使用（お気に入りのストリームをアーカイブに保存し、後でインターネットなしで視聴するため）のためにコンテンツをダウンロードすることは、通常、権利侵害にはなりません。しかし、ダウンロードしたVODを他のプラットフォームに公にアップロードしたり、ストリーマーの同意なしに商業目的で使用したりすることは、ストリーマーの権利を侵害する可能性があります。著作者の労力を尊重し、ダウンロードしたビデオは個人的なコレクションとして利用しましょう。
