      faq:
        - question: Kann ich den aktuellen Live-Stream (Live), der gerade läuft,
            herunterladen?
          answer: Nein, Sie können einen Live-Stream nicht direkt über unseren Dienst
            herunterladen, da das Video noch nicht vollständig ist und nicht als
            ganze Datei auf den Twitch-Servern gespeichert wird. Sie müssen das
            Ende der Übertragung abwarten. Danach erscheint sie im Reiter "VOD"
            auf dem Kanal des Streamers. Kopieren Sie den Link zu dieser
            Aufzeichnung und unser Downloader wird sie einfach herunterladen.
        - question: Warum werden einige VODs nicht heruntergeladen oder geben eine
            Fehlermeldung aus?
          answer: Dies kann mit den Datenschutzeinstellungen zusammenhängen. Wenn der
            Streamer während des Streams den Modus "Nur für Abonnenten"
            aktiviert oder das VOD später nur über ein Abonnement verfügbar
            gemacht hat, kann unser Dienst (wie jedes andere öffentliche Tool)
            nicht auf das Video zugreifen. Suchen Sie nach öffentlichen VODs
            oder Clips.
        - question: Ich habe die VOD heruntergeladen und sie wiegt sehr viel. Ist das
            normal?
          answer: Ja, das ist völlig normal. Videos in hoher Qualität (insbesondere 1080p
            mit hoher Bitrate) benötigen viel Platz. Ein zweistündiger Stream in
            guter Qualität kann zum Beispiel 3-5 GB wiegen. Wir laden die
            Originaldatei ohne Komprimierung herunter, so dass die Größe der
            Originaldatei entspricht.
        - question: Wie kann ich Twitch-Videos auf mein Handy (Android oder iPhone)
            herunterladen?
          answer: Ganz einfach! Öffnen Sie unsere Website im Browser Ihres Handys (Chrome,
            Safari), fügen Sie den Link zum Clip oder VOD ein und drücken Sie
            auf "Download". Auf Android wird die Datei im Ordner "Downloads"
            angezeigt. Auf dem iPhone klicken Sie auf "Download" und speichern
            das Video in der App "Dateien" oder teilen es.
        - question: Gibt es eine Begrenzung der Länge von VOD, die heruntergeladen werden
            kann?
          answer: Wir versuchen, unsere Nutzer nicht einzuschränken. Sie können sowohl
            kurze Clips (30 Sekunden) als auch stundenlange Streams (z. B.
            8-stündige Marathons oder Game Walkthroughs) herunterladen. Die
            einzige Bedingung ist die Stabilität Ihrer Internetverbindung, da
            die Dateien sehr groß sein können.
        - question: Verletze ich das Urheberrecht des Streamers, wenn ich seine Videos
            herunterlade?
          answer: Das Herunterladen von Inhalten für den persönlichen Gebrauch (um den
            Lieblingsstream in einem Archiv zu speichern und ihn später ohne
            Internet anzusehen) stellt in der Regel keine Rechtsverletzung dar.
            Das öffentliche Hochladen heruntergeladener VODs auf andere
            Plattformen oder die Nutzung zu kommerziellen Zwecken ohne die
            Zustimmung des Streamers kann jedoch dessen Rechte verletzen.
            Respektieren Sie die Arbeit der Urheber und verwenden Sie die
            heruntergeladenen Videos für Ihre persönliche Sammlung.
