          - icon: "🌍 "
            title: 모든 기기에서 작동
            description: 사용자 친화적인 인터페이스는 PC, 태블릿, 스마트폰(Android/iOS)에 맞게 조정되었습니다. 앱을 설치하지 않고
              브라우저에서 바로 Twitch의 동영상을 다운로드할 수 있습니다.
          - icon: "💯 "
            title: 완전 무료
            description: 서비스 이용에 대한 요금은 부과되지 않습니다. 제한, 구독 및 숨겨진 수수료 없이 원하는 만큼 동영상과 클립을
              다운로드하세요.
      faq:
        - question: 현재 진행 중인 생방송(라이브)을 다운로드할 수 있나요?
          answer: 아니요, 동영상이 아직 완성되지 않았고 Twitch 서버에 전체 파일로 저장되지 않았으므로 서비스를 사용하여 생방송을 직접
            다운로드할 수 없습니다. 방송이 끝날 때까지 기다려야 하며, 그 후에 스트리머 채널의 "VOD" 탭에 표시됩니다. 이
            녹화에 대한 링크를 복사하면 다운로더가 쉽게 다운로드할 수 있습니다.
