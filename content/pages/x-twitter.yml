            করা সম্ভব?
          answer: না। আমাদের ডাউনলোডার শুধুমাত্র পাবলিক টুইটের সাথে কাজ করে। যদি কোনো
            ব্যবহারকারীর অ্যাকাউন্ট ব্যক্তিগত হয় (শুধুমাত্র ফলোয়াররা ভিডিও
