        - question: ਤੁਸੀਂ X (ਟਵਿੱਟਰ) ਤੋਂ ਆਪਣੇ ਐਂਡਰਾਇਡ ਜਾਂ ਆਈਫੋਨ 'ਤੇ ਵੀਡੀਓਜ਼ ਕਿਵੇਂ ਡਾਊਨਲੋਡ
            ਕਰ ਸਕਦੇ ਹੋ?
