            খুলুন, টুইটের লিঙ্ক পেস্ট করুন এবং ডাউনলোড ক্লিক করুন।
            অ্যান্ড্রয়েডে ফাইলটি "Downloads" ফোল্ডারে থাকবে। আইফোনে "Download"
