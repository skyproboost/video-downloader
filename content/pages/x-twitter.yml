              link".

              2.  Cola-o no carregador. Regressa ao nosso sítio Web, cola a
              ligação copiada na caixa acima e clica em "Transferir".

              3.  Guarde o resultado. O sistema processará o pedido e
              oferecer-lhe-á a possibilidade de descarregar o vídeo na melhor
              qualidade disponível (normalmente MP4).
          - title: Porque é que os utilizadores escolhem o nosso serviço?
