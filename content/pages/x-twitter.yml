            ਸੇਵ ਕਰੋ।
        - question: ਜੇ ਟਵੀਟ ਸੁਰੱਖਿਅਤ (ਨਿੱਜੀ ਖਾਤਾ) ਹੋਵੇ ਤਾਂ ਕੀ ਵੀਡੀਓ ਡਾਊਨਲੋਡ ਕਰਨਾ ਸੰਭਵ ਹੈ?
          answer: ਨਹੀਂ। ਸਾਡਾ ਡਾਊਨਲੋਡਰ ਸਿਰਫ਼ ਜਨਤਕ ਟਵੀਟਾਂ ਨਾਲ ਹੀ ਕੰਮ ਕਰਦਾ ਹੈ। ਜੇ ਕਿਸੇ ਯੂਜ਼ਰ
