        blocks:
          - content: >-
              Como transferir vídeos do X (Twitter) e guardar os seus momentos
              favoritos para sempre


              O X (antigo Twitter) já não é apenas uma plataforma para mensagens
              de texto curtas. Atualmente, é um enorme arquivo de conteúdos em
              direto, desde trailers exclusivos e cortes de transmissões a memes
              virais e transmissões em direto. No entanto, este conteúdo tem a
              particularidade de se afogar no feed. As notícias substituem-se
              umas às outras a cada segundo, e os vídeos favoritos podem
              desaparecer para sempre se o autor apagar um tweet ou fechar a
              conta.


              Encontrou um vídeo engraçado, um fluxo analítico importante ou um
              clip bonito, mas tem medo de o perder? Ou quer guardar o vídeo na
              memória do seu telemóvel para o poder ver sem acesso à Internet? É
              para isso que serve o nosso descarregador de vídeos do Twitter
              online.


              Ao contrário do streaming, o vídeo guardado permanece sempre no
              seu dispositivo. Pode reencaminhá-lo para os seus amigos nos
              messengers, utilizá-lo nos seus projectos ou simplesmente criar
              uma coleção dos seus tweets favoritos que não se perderá mesmo que
              a página do autor seja bloqueada.
