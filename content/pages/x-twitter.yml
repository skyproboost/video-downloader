            ਵੈਬਸਾਈਟ ਖੋਲ੍ਹੋ, ਟਵੀਟ ਦਾ ਲਿੰਕ ਪੇਸਟ ਕਰੋ ਅਤੇ ਡਾਊਨਲੋਡ 'ਤੇ ਕਲਿੱਕ ਕਰੋ।
