              rápida y gratuita de crear tu propia colección de los mejores
              vídeos de las redes sociales.
      features:
        title: Ventajas
        items:
          - icon: "🎥 "
            title: Calidad de vídeo original
            description: "Descarga vídeos directamente de los servidores de X (Twitter) sin
              compresión. Consigue el vídeo exactamente como lo subió el autor:
              de 360p a 4K."
          - icon: "⚡ "
            title: Descarga instantánea
            description: No convertimos el vídeo, sólo te damos el archivo terminado. La
              descarga comienza un segundo después de insertar el enlace.
          - icon: "🔒 "
            title: De forma anónima y confidencial
            description: No almacenamos su historial de descargas ni solicitamos acceso a su
              cuenta X. Todos los enlaces se eliminan del servidor
              inmediatamente después de su uso. Sin registro.
          - icon: "🌍 "
            title: Funciona en todas partes y todo el tiempo
            description: La interfaz de fácil manejo está adaptada para PC, tabletas y
              smartphones (Android/iOS). Descarga vídeos directamente en tu
              navegador sin instalar aplicaciones.
          - icon: "📱 "
            title: Compatibilidad con dispositivos móviles
            description: ¿Quieres descargar vídeos de Twitter a iPhone o Android? Nuestro
              sitio está optimizado para navegadores móviles y los archivos se
              guardan sin problemas en la memoria de tu dispositivo.
          - icon: "✂️ "
            title: Totalmente gratis
            description: No cobramos por utilizar el servicio. Descarga todos los vídeos que
              quieras sin límites ni suscripciones.
      faq:
        - question: ¿Cuál es la calidad máxima de vídeo que puedo descargar?
          answer: Obtendrás el vídeo en la máxima calidad disponible en el tuit original.
            Si el autor subió el vídeo en 1080p, descargarás 1080p. Si está en
            4K, descargarás 4K. Nuestro servicio no degrada la calidad.
        - question: ¿Es peligroso descargar archivos a través de este servicio? ¿Puedo
            contraer un virus?
          answer: Totalmente seguro. No almacenamos archivos en el servidor ni los
            modificamos. Los vídeos se descargan directamente de los servidores
            oficiales de X (Twitter). No hay anuncios maliciosos ni solicitudes
            de instalación de software de terceros.
        - question: ¿Cómo descargo vídeos de X (Twitter) a mi teléfono Android o iPhone?
          answer: Muy sencillo Abre nuestra web en el navegador de tu teléfono (Chrome,
            Safari), pega el enlace al tuit y pulsa descargar. En Android, el
            archivo acabará en la carpeta "Descargas". En iPhone, pulsa
            "Descargar" y luego comparte el archivo o guárdalo en "Archivos".
        - question: ¿Puedo descargar un vídeo si el tuit está protegido (cuenta privada)?
          answer: No. Nuestro descargador sólo funciona con tuits públicos. Si la cuenta
            de un usuario está cerrada (sólo los suscriptores pueden ver el
            vídeo), no es posible descargar el vídeo a través del servicio en
            línea.
        - question: ¿Qué hacer si después de descargar un vídeo no se abre o no hay
            sonido?
          answer: Esto ocurre muy raramente y suele deberse a las peculiaridades del vídeo
            de origen en Twitter. Intenta descargar el vídeo más tarde o utiliza
            otro enlace. A veces se producen problemas con vídeos "empalmados"
            en tuits largos.
        - question: ¿Es legal descargar vídeos de X (Twitter)?
          answer: La descarga de contenidos para uso personal (para conservar un vídeo
            como recuerdo o para verlo sin conexión) no suele infringir las
            leyes. Te recomendamos que respetes los derechos de autor y no
            utilices los vídeos descargados con fines comerciales sin el permiso
            del autor.
